model = "gpt-5.4"
model_reasoning_effort = "high"

[features]
rmcp_client = true

[projects."/Users/kirtansolanki/Desktop/Journal.IO"]
trust_level = "trusted"

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.mongodb]
command = "npx"
args = ["-y", "mongodb-mcp-server@1.0.0", "mongodb://localhost:27017", "--readOnly"]
startup_timeout_sec = 60
tool_timeout_sec = 120

# Project-local MCP starter config for Journal.IO.
# Keep committed config free of secrets. Prefer bearer_token_env_var when possible.
# If a server requires fixed API keys or auth headers, add them only in a developer-local
# override that is not committed to git.

# Example: remote HTTP MCP server with explicit env-backed auth details.
# bearer_token_env_var = "FIGMA_OAUTH_TOKEN"
# http_headers = { "X-Figma-Region" = "us-east-1" }

